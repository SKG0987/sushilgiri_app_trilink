name: trilink_assignment
description: Flutter Internship Assignment - May 2026 Batch

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.3.0
  http: ^1.2.0
  provider: ^6.1.1
  google_fonts: ^6.1.0
  image_picker: ^1.0.0
  image: ^4.0.0
  shared_preferences: ^2.2.0
  bcrypt: ^1.2.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^11.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/sg_white.png
    - assets/sg_black.png
    - assets/icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon.png"
  min_sdk_android: 21
